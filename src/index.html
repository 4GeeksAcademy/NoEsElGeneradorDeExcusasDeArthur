<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock, Paper, Scissors, Lizard, Spock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="/style.css">
</head>

<body>
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
   <div id="ContDesafio">
        <div class="row text-center d-flex justify-content-center align-items-center">
            <div class="col-auto">
                <h1 class="p-4 mt-5 bg-white border border-black rounded">¡Sheldon te desafía!</h1>
            </div>
        </div>
        <div id="pantalla_1" class="row-auto text-center d-flex justify-content-center align-items-center vh-100">
            <div class="row text-center d-flex justify-content-center align-items-center mt-3">
                <div class="col-auto">
                    <h1 class="rounded bg-body p-2">
                        ¿Aceptas?
                    </h1>
                    <button type="button" name="opcion" id="desafio" class="toPlay img-fluid">
                        <img class="opcionPlayer" src="/assets/img/Desafío.png">
                    </button>
                </div>
            </div>
        </div>
    </div>

      <!-- Opciones de juego  -->
    <div id="ContJuego" class="d-none">
        <div class="row text-center d-flex justify-content-center align-items-center">
            <div class="col-auto">
                <h1 class="p-4 mt-5 bg-white border border-black rounded">¡Elige tu arma!</h1>
            </div>
            <div class="row justify-content-center flex-row mt-5">
                <div class="col-auto">
                    <div class="d-grid gap-2 col-2 col-sm-2 m-1">
                        <button type="button" name="opcion" id="Piedra" class="opcionPlayer img-fluid ">
                            <img class="opcionPlayerImg" src="/assets/img/Piedra.png">
                        </button>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="d-grid gap-2 col-2 col-sm-2 m-1">
                        <button type="button" name="opcion" id="Papel" class="opcionPlayer img-fluid">
                            <img class="opcionPlayerImg" src="/assets/img/Papel.png">
                        </button>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="d-grid gap-2 col-2 col-sm-2 m-1">
                        <button type="button" name="opcion" id="Tijeras" class="opcionPlayer img-fluid">
                            <img class="opcionPlayerImg" src="/assets/img/Tijeras.png">
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center flex-row m-2">
            <div class="col-auto">
                <div class="d-grid gap-2 col-2 col-sm-2 m-1">
                    <button type="button" name="opcion" id="Lagarto" class="opcionPlayer img-fluid bg">
                        <img class="opcionPlayerImg" src="/assets/img/Lagartija.png">
                    </button>
                </div>
            </div>
            <div class="col-auto">
                <div class="d-grid gap-2 col-2 col-sm-2 m-1">
                    <button type="button" name="opcion" id="Spock" class="opcionPlayer img-fluid">
                        <img class="opcionPlayerImg" src="/assets/img/Spock.png">
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="select" class="row text-center d-flex justify-content-center align-items-center vh-100 d-none ">
        <div class="col-8 col-md-6 bg-body rounded p-3 my-5">
            <div class="row mt-4">
                <h3 id="playerSel"></h3>
                <h3 id="sheldonSel"></h3>
            </div>
            <div class="col-auto mt-4">
                <img src="https://media1.tenor.com/m/G1g_c3XrwlUAAAAC/nervioso-nervios.gif" id="UWin" class="d-none img-fluid w-50" />
                <img src="https://media1.tenor.com/m/0b2W8yEmnOgAAAAC/sheldon-cooper.gif" id="Empate"
                    class="d-none img-fluid w-50" />
                <img src="https://media1.tenor.com/m/mwG6PwH9XMgAAAAC/sheldon-cooper-brainy.gif" id="ULoose"
                    class="d-none img-fluid w-50" />
            </div>
            <div class="col-auto mt-4">
                <h3 id="textoResultado"></h3>
            </div>
            <div class="row text-center d-flex justify-content-end align-items-end mt-3">
                <div class="col-auto">
                    <button id="restart" class="toPlay btn btn-white border rounded bg-primary"
                        style="height: 80px; width: 100px; font-size: 18px;">Jugar de nuevo
                    </button>
                </div>
            </div>
        </div>

    </div>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
    integrity="sha384-7qAoOXltbVP82dhxHAUje59V5r2YsVfBafyUDxEdApLPmcdhBPg1DKg1ERo0BZlK"
    crossorigin="anonymous"></script>
</body>

</html>
